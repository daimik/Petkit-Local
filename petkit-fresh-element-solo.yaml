switch:
  # --- feeder ---
  - id: enable_sensors
    internal: true
    platform: gpio
    pin:
      number: GPIO33
    restore_mode: ALWAYS_ON
    disabled_by_default: true
  - id: enable_feeder_motor
    internal: true
    platform: gpio
    pin:
      number: GPIO19
    restore_mode: ALWAYS_OFF
    disabled_by_default: true
  - id: feed_forward
    internal: true
    interlock: &interlock_group [feed_forward, feed_reverse]
    platform: gpio
    pin:
      number: GPIO18
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - switch.turn_on: enable_feeder_motor
    on_turn_off:
      then:
        - switch.turn_off: enable_feeder_motor
  - id: feed_reverse
    internal: true
    interlock: *interlock_group
    platform: gpio
    pin:
      number: GPIO17
    restore_mode: ALWAYS_OFF
  - id: mute_sounds
    name: Mute sounds
    icon: mdi:volume-off
    optimistic: true
    platform: template
    web_server:
      sorting_group_id: sg_settings
      sorting_weight: 30
  # --- fountain ---
  - platform: template
    id: fountain_power_sw
    name: "Fountain Power"
    icon: mdi:power
    optimistic: false
    turn_on_action:
      - script.execute:
          id: pk_send_220
          pwr: !lambda 'return 1;'
          mde: !lambda 'return id(pk_mode);'
    turn_off_action:   # equals "Pause" in the PetKit app
      - script.execute:
          id: pk_send_220
          pwr: !lambda 'return 0;'
          mde: !lambda 'return id(pk_mode);'
    web_server:
      sorting_group_id: sg_fountain
      sorting_weight: 10

sensor:
  # --- feeder ---
  - platform: wifi_signal
    name: "Signal"
    update_interval: 60s
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 60
  - platform: template
    id: dispensed_food_quantity
    name: "Dispensed food quantity"
    icon: mdi:cup
    entity_category: diagnostic
    state_class: "measurement"
    accuracy_decimals: 0
    lambda: |-
      return id(last_food_sensor_count);
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 20
  - platform: template
    id: dispensed_food_scoops
    name: "Food Servings Dispensed"
    icon: mdi:cup
    entity_category: diagnostic
    state_class: "measurement"
    accuracy_decimals: 0
    lambda: |-
      return id(last_food_scoops_count);
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 30
  # --- desiccant days remaining ---
  - platform: template
    id: desiccant_days_left
    name: "Desiccant days left"
    icon: mdi:water-percent
    unit_of_measurement: "d"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    web_server:
      sorting_group_id: sg_feeding
      sorting_weight: 40
  # --- fountain: notification receiver + frame parser ---
  - platform: ble_client
    ble_client_id: fountain
    id: pk_raw_notify
    internal: true
    type: characteristic
    service_uuid: 0000aaa0-0000-1000-8000-00805f9b34fb
    characteristic_uuid: 0000aaa1-0000-1000-8000-00805f9b34fb
    notify: true
    lambda: |-
      // Accumulate: responses can be split across BLE notifications (MTU)
      auto &buf = id(pk_rx);
      buf.insert(buf.end(), x.begin(), x.end());

      while (true) {
        // resync to frame header FA FC FD
        while (buf.size() >= 3 &&
               !(buf[0] == 0xFA && buf[1] == 0xFC && buf[2] == 0xFD))
          buf.erase(buf.begin());
        if (buf.size() < 8) break;
        size_t len = buf[6];
        size_t total = 8 + len + 1;
        if (buf.size() < total) break;   // frame incomplete, wait for more

        uint8_t cmd = buf[3];
        std::vector<uint8_t> d(buf.begin() + 8, buf.begin() + 8 + len);
        buf.erase(buf.begin(), buf.begin() + total);
        ESP_LOGD("petkit", "Frame cmd=%d len=%d", cmd, (int) len);

        switch (cmd) {
          case 213: {  // device identifiers
            if (d.size() >= 8) {
              id(pk_dev_id).assign(d.begin() + 2, d.begin() + 8);
              std::string serial;
              for (size_t i = 8; i < d.size() && i < 23; i++)
                serial += (char) d[i];
              id(fountain_serial).publish_state(serial);
              ESP_LOGI("petkit", "Device ID acquired, serial=%s", serial.c_str());
            }
            break;
          }
          case 86: {   // sync
            if (!d.empty())
              ESP_LOGI("petkit", "Sync response, initialized=%d", d[0]);
            break;
          }
          case 200: {  // firmware
            if (d.size() >= 2) {
              char fw[16];
              snprintf(fw, sizeof(fw), "%d.%d", d[0], d[1]);
              id(fountain_firmware).publish_state(fw);
            }
            break;
          }
          case 66: {   // battery
            if (d.size() >= 3) {
              id(fountain_voltage).publish_state(((d[0] << 8) | d[1]) / 1000.0f);
            }
            break;
          }
          case 222: {  // filter reset ack
            ESP_LOGI("petkit", "Filter reset acknowledged by fountain");
            break;
          }
          case 210: {  // state
            if (d.size() >= 12) {
              id(pk_power) = d[0];
              id(pk_mode) = (d[1] == 2) ? 2 : 1;
              id(fountain_power_sw).publish_state(d[0] != 0);
              id(fountain_mode_sel).publish_state(d[1] == 2 ? "Smart" : "Normal");
              id(fountain_warn_breakdown).publish_state(d[3] != 0);
              id(fountain_warn_water).publish_state(d[4] != 0);
              id(fountain_warn_filter).publish_state(d[5] != 0);
              uint32_t runtime = ((uint32_t) d[6] << 24) | ((uint32_t) d[7] << 16) |
                                 ((uint32_t) d[8] << 8) | (uint32_t) d[9];
              char rt[40];
              uint32_t days = runtime / 86400;
              uint32_t hours = (runtime % 86400) / 3600;
              uint32_t mins = (runtime % 3600) / 60;
              uint32_t secs = runtime % 60;
              if (days > 0)
                snprintf(rt, sizeof(rt), "%ud %uh %um %us", days, hours, mins, secs);
              else if (hours > 0)
                snprintf(rt, sizeof(rt), "%uh %um %us", hours, mins, secs);
              else
                snprintf(rt, sizeof(rt), "%um %us", mins, secs);
              id(fountain_pump_runtime_text).publish_state(rt);
              float filter_used = 100.0f - d[10];
              id(fountain_filter).publish_state(filter_used);
              id(fountain_running).publish_state(d[11] != 0);
            }
            break;
          }
          default:
            ESP_LOGD("petkit", "Unhandled cmd %d", cmd);
        }
      }
      return NAN;
  # --- fountain: exposed entities ---
  - platform: template
    id: fountain_voltage
    name: "Fountain Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    update_interval: never
    web_server:
      sorting_group_id: sg_fountain
      sorting_weight: 80
  - platform: template
    id: fountain_filter
    name: "Fountain Filter used"
    unit_of_measurement: "%"
    icon: mdi:air-filter
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never
    web_server:
      sorting_group_id: sg_fountain
      sorting_weight: 65

button:
  - name: "Dispense food"
    id: dispense_food
    icon: mdi:food-turkey
    platform: template
    on_press:
      - lambda: id(actuate_feeder)->execute((int) id(default_scoops).state);
    web_server:
      sorting_group_id: sg_feeding
      sorting_weight: 10
  - platform: template
    name: "Apply schedule"
    id: apply_schedule_btn
    icon: mdi:calendar-check
    on_press:
      - script.execute: validate_schedule
    web_server:
      sorting_group_id: sg_feeding
      sorting_weight: 25
  - platform: template
    name: "Reset desiccant"
    id: reset_desiccant_btn
    icon: mdi:water-percent
    on_press:
      - lambda: |-
          auto t = id(sntp_time).now();
          if (!t.is_valid()) {
            ESP_LOGW("desiccant", "Cannot reset desiccant counter: time not synced yet");
            return;
          }
          id(desiccant_last_reset) = t.timestamp;
          id(feeder_desiccant_warn).publish_state(false);
          id(desiccant_days_left).publish_state(${desiccant_interval_days});
          ESP_LOGI("desiccant", "Desiccant counter reset, next replacement in ${desiccant_interval_days} days");
    web_server:
      sorting_group_id: sg_feeding
      sorting_weight: 45
  - platform: template
    name: "Sync time now"
    id: sync_time_btn
    icon: mdi:clock-sync-outline
    on_press:
      - lambda: |-
          ESP_LOGI("time", "Manual NTP sync requested");
          id(sntp_time).update();
    web_server:
      sorting_group_id: sg_settings
      sorting_weight: 18
  - platform: template
    name: "Fountain Reset Filter"
    id: fountain_reset_filter_btn
    icon: mdi:air-filter
    on_press:
      - if:
          condition:
            lambda: 'return id(pk_connected) && id(pk_ready);'
          then:
            - lambda: 'ESP_LOGI("petkit", "Sending filter reset (cmd 222) to fountain");'
            - script.execute: pk_send_222
          else:
            - lambda: 'ESP_LOGW("petkit", "Cannot reset filter: fountain not connected/ready");'
    web_server:
      sorting_group_id: sg_fountain
      sorting_weight: 85
  - platform: template
    name: "Fountain Refresh Data"
    on_press:
      - script.execute: pk_poll
    web_server:
      sorting_group_id: sg_fountain
      sorting_weight: 90
  - platform: restart
    name: "Restart"
    disabled_by_default: true
    web_server:
      sorting_group_id: sg_diag
      sorting_weight: 90
